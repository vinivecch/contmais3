<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Amanda | Contmais </title>
    <script>
      // Early fix for 'Cannot set property fetch of #<Window> which has only a getter'
      window.global = window;
      (function() {
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() { return originalFetch; },
            set: function() { console.warn('Something tried to overwrite window.fetch - ignored.'); }
          });
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
